[genhubitat]

# Port for the REST/WebSocket API server.
# Must not conflict with genhalink (9083) if both addons are running.
port = 9084

# API key for Bearer token authentication.
# Leave blank — genserv.py will auto-generate one on first enable.
api_key =

# Address that genmon is listening on (usually localhost).
monitor_address = localhost

# Seconds between genmon data polls.
poll_interval = 3

# Comma-separated keywords to exclude from the API response.
# Any data path containing the keyword (case-insensitive) is omitted.
blacklist = Tiles

# Set to True to include monitor/platform stats (CPU temp, WiFi, memory).
include_monitor_stats = True

# Set to True to include weather data when available.
include_weather = True

# Zeroconf/mDNS broadcasting is disabled by default.
# Enable only if your Hubitat hub supports automatic service discovery.
zeroconf_enabled = False

# Use HTTPS (TLS). A self-signed certificate is generated automatically.
use_https = True

# Enable verbose debug logging.
debug = False
