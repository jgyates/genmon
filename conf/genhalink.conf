[genhalink]

# Port for the REST/WebSocket API server
port = 9083

# API key for authentication (auto-generated on first start if empty)
api_key =

# Address of the genmon instance to connect to
monitor_address = localhost

# Polling interval in seconds
poll_interval = 3

# Comma-separated keywords to exclude from the API (case-insensitive substring match).
# Top-level sections: Status, Maintenance, Outage, Monitor, Tiles
# Examples: Tiles, Weather, Platform Stats, Last Log Entries, Serial Number
blacklist =

# Include monitor/platform stats
include_monitor_stats = True

# Include weather data
include_weather = True

# Enable Zeroconf/mDNS service broadcasting
zeroconf_enabled = True

# Serve the API over HTTPS with an auto-generated self-signed certificate.
# Set to False only for debugging. Existing installs default to True.
use_https = True

# Enable verbose debug logging for troubleshooting entity filtering and data flow
# only set this to true in a temporary basis as this increases writes to the SD card
debug = False
